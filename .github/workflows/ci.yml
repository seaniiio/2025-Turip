name: CI Build and Test

on:
  pull_request:
    types: [closed] # Pull Request가 닫힐 때 아래 jobs가 실행
    branches: [ develop ]
    paths:
      - 'backend/**'

jobs: # on 상황에서 수행할 작업들 정의
  build_and_test:
     runs-on: ubuntu-latest # GitHub 호스팅 러너 사용
     defaults:
      run:
        working-directory: backend
     steps: 
     - name: Checkout code
       uses: actions/checkout@v4 # 저장소 코드 체크아웃

     - name: Set up Gradle
       uses: gradle/actions/setup-gradle@v3

      
