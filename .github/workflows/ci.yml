name: CI Build and Test, EC2 CD

on:
  pull_request:
    types: [ closed ]
    branches: [ develop ]
    paths:
      - 'backend/**'

jobs:
  build_and_test:
     runs-on: ubuntu-latest
     
     defaults:
      run:
        working-directory: backend
        
     steps: 
     - name: Checkout code
       uses: actions/checkout@v4

     - name: Set up Gradle
       uses: gradle/actions/setup-gradle@v3
             
     - name: Grant execute permission for gradlew
       run: chmod +x gradlew

     - name: Set up JDK 21
       uses: actions/setup-java@v4
       with:
         java-version: '21'
         distribution: 'temurin'
         cache: 'gradle'
       
     - name: Build with Gradle
       run: ./gradlew clean build -x test

     - name: Run Unit Tests
       run: ./gradlew test

     - name: Upload Jar
       uses: actions/upload-artifact@v4
       with:
         name: spring-boot-app
         path: backend/build/libs/*.jar
         retention-days: 5


  deploy:
    needs: build_and_test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download artifact from CI workflow
        uses: actions/download-artifact@v4
        with:
          name: spring-boot-app
          path: ./downloaded-artifact

      - name: Get JAR file name
        id: get_jar_name
        run: |
          JAR_FILE=$(find ./downloaded-artifact -name "*.jar" | head -n 1)
          if [ -z "$JAR_FILE" ]; then
            echo "Error: JAR file not found in downloaded-artifact directory."
            exit 1
          fi

          echo "JAR_NAME=$(basename $JAR_FILE)" >> $GITHUB_OUTPUT
          echo "Found JAR: ${{ steps.get_jar_name.outputs.JAR_NAME }}"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v.0.1.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            CURRENT_PID=$(pgrep -f "${{ steps.get_jar_name.outputs.JAR_NAME }}")
            if [ -n "$CURRENT_PID" ]; then
                echo "Found existing process with PID: $CURRENT_PID. Killing it..."
                kill -15 $CURRENT_PID # SIGTERM (Graceful shutdown)
                sleep 10 # 종료 대기
                if kill -0 $CURRENT_PID 2>/dev/null; then
                    echo "Process $CURRENT_PID did not terminate gracefully. Forcing kill..."
                    kill -9 $CURRENT_PID # SIGKILL (Force kill)
                fi
            else
                echo "No existing application process found."
            fi
            
            REMOTE_JAR_PATH="/home/ubuntu/app/${{ steps.get_jar_name.outputs.JAR_NAME }}"
            DOWNLOADED_JAR_ON_EC2="/tmp/${{ steps.get_jar_name.outputs.JAR_NAME }}"
            
            echo "Moving new JAR file to $REMOTE_JAR_PATH"

            sudo mv $DOWNLOADED_JAR_ON_EC2 $REMOTE_JAR_PATH
            sudo chmod +x $REMOTE_JAR_PATH

            echo "Starting new application..."
            nohup java -jar $REMOTE_JAR_PATH > /dev/null 2>&1 &
            
            echo "Waiting for application to start and performing health check..."
            sleep 30
            
            HEALTH_CHECK_URL="http://localhost:8080/actuator/health"
            STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" $HEALTH_CHECK_URL)
            
            if [ "$STATUS_CODE" -eq 200 ]; then
                echo "Deployment successful! Application is running."
            else
                echo "Deployment failed! Health check returned $STATUS_CODE."
                exit 1
            fi
