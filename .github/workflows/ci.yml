name: CI Build and Test

on:
  pull_request:
    types: [closed] # Pull Request가 닫힐 때 아래 jobs가 실행
    branches: [ develop ]

jobs: # on 상황에서 수행할 작업들 정의
  build:
     runs-on: ubuntu-latest # GitHub 호스팅 러너 사용
     defaults:
      run:
        working-directory: backend
     steps: 
     - name: Checkout code
       uses: actions/checkout@v4 # 저장소 코드 체크아웃

     - name: Set up Gradle
       uses: gradle/actions/setup-gradle@v3
       
     - name: Grant execute permission for gradlew
       run: chmod +x gradlew

     - name: Set up JDK 21
       uses: actions/setup-java@v4
       with:
         java-version: '21'
         distribution: 'temurin'
         cache: 'gradle' # Gradle 캐싱 설정 (선택 사항, 빌드 속도 향상)
       
     - name: Build with Gradle
       run: ./gradlew clean build -x test # 테스트는 별도 스텝에서 실행하거나, 여기 포함 가능
  test:
     runs-on: ubuntu-latest # GitHub 호스팅 러너 사용
     defaults:
      run:
        working-directory: backend
     needs: build
     steps:
     - name: Debug - Verify working directory path
       run: |
         echo "Current working directory before any changes:"
         pwd # 현재 스텝이 시작되는 디렉토리 (저장소 루트)
          
         echo "Listing contents of repository root:"
         ls -la # 저장소 루트의 내용을 확인 (backend 디렉토리가 보이는지)
          
         echo "Listing contents of the expected backend directory:"
         ls -la ./backend # backend 디렉토리 내부의 내용을 확인
          
         echo "Full path being used for working-directory:"
         echo "/home/runner/work/${{ github.repository }}/backend" # YML에 설정된 최종 경로 예상
     
     - name: Run Unit Tests
       run: ./gradlew test # 유닛 테스트 실행 (선택 사항, 빌드와 분리하여 명확성 확보)

  upload_jar:
     runs-on: ubuntu-latest # GitHub 호스팅 러너 사용
     defaults:
      run:
        working-directory: backend
     needs: test
     steps:
     - name: Upload Jar
       uses: actions/upload-artifact@v4 # 빌드된 JAR 파일을 아티팩트로 업로드
       with:
         name: spring-boot-app # 아티팩트 이름
         path: build/libs/*.jar # 빌드된 JAR 파일 경로
         retention-days: 5 # 아티팩트 보존 기간 (선택 사항)
      
