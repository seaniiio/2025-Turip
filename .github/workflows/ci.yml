name: CI Build and Test, EC2 CD

on:
  pull_request:
    types: [ closed ]
    branches: [ develop ]
    paths:
      - 'backend/**'

jobs:
  build_and_test:
     runs-on: self-hosted
     
     defaults:
      run:
        working-directory: backend
        
     steps: 
     - name: Checkout code
       uses: actions/checkout@v4

     - name: Set up Gradle
       uses: gradle/actions/setup-gradle@v3
             
     - name: Grant execute permission for gradlew
       run: chmod +x gradlew

     - name: Set up JDK 21
       uses: actions/setup-java@v4
       with:
         java-version: '21'
         distribution: 'temurin'
         cache: 'gradle'
       
     - name: Build with Gradle
       run: ./gradlew clean build -x test

     - name: Run Unit Tests
       run: ./gradlew test

     - name: Upload Jar
       uses: actions/upload-artifact@v4
       with:
         name: spring-boot-app
         path: backend/build/libs/*.jar
         retention-days: 5


  deploy:
    needs: build_and_test
    runs-on: self-hosted
    environment: production

    steps:
      - name: Download artifact from CI workflow
        uses: actions/download-artifact@v4
        with:
          name: spring-boot-app
          path: ./downloaded-artifact

      - name: Get JAR file name
        id: get_jar_name
        run: |
          JAR_FILE=$(find ./downloaded-artifact -name "*.jar" | head -n 1)
          if [ -z "$JAR_FILE" ]; then
            echo "Error: JAR file not found in downloaded-artifact directory."
            exit 1
          fi
          echo "JAR_NAME=$(basename $JAR_FILE)" >> $GITHUB_OUTPUT
          echo "JAR file located at: $JAR_FILE"

          echo "Stopping existing application..."
          CURRENT_PID=$(ps aux | grep "$JAR_NAME" | grep -v grep | awk '{print $2}')
          if [ -z "$CURRENT_PID" ]; then
              echo "No existing application found on port 80."
          else
              echo "Found existing process on port 80 with PID: $CURRENT_PID. Killing it..."
              sudo kill -15 "$CURRENT_PID"
              sleep 10
              if sudo kill -0 "$CURRENT_PID" 2>/dev/null; then
                  echo "Process $CURRENT_PID did not terminate gracefully. Forcing kill..."
                  sudo kill -9 "$CURRENT_PID"
              fi
          fi
    
      - name: Deploy application (local execution in EC2)
        run: |
          JAR_NAME="${{ steps.get_jar_name.outputs.JAR_NAME }}"
          DOWNLOADED_JAR="./downloaded-artifact/$JAR_NAME"
          TARGET_JAR="/home/ubuntu/app/$JAR_NAME"

          echo "Moving new JAR to $TARGET_JAR"
          mv "$DOWNLOADED_JAR" "$TARGET_JAR"
          chmod +x "$TARGET_JAR"

          echo "Starting application..."
          sudo nohup java -jar "$TARGET_JAR" --server.port=80 > /dev/null 2>&1 &
