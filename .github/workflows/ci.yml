name: CI Build and Test, EC2 CD

on:
  pull_request:
    types: [ closed ]
    branches: [ develop ]
    paths:
      - 'backend/**'

jobs:
  build_and_test:
     runs-on: self-hosted
     
     defaults:
      run:
        working-directory: backend
        
     steps: 
     - name: Checkout code
       uses: actions/checkout@v4

     - name: Set up Gradle
       uses: gradle/actions/setup-gradle@v3
             
     - name: Grant execute permission for gradlew
       run: chmod +x gradlew

     - name: Set up JDK 21
       uses: actions/setup-java@v4
       with:
         java-version: '21'
         distribution: 'temurin'
         cache: 'gradle'
       
     - name: Build with Gradle
       run: ./gradlew clean build -x test

     - name: Run Unit Tests
       run: ./gradlew test

     - name: Upload Jar
       uses: actions/upload-artifact@v4
       with:
         name: spring-boot-app
         path: backend/build/libs/*.jar
         retention-days: 5


  deploy:
    needs: build_and_test
    runs-on: self-hosted
    environment: production

    steps:
      - name: Download artifact from CI workflow
        uses: actions/download-artifact@v4
        with:
          name: spring-boot-app
          path: ./downloaded-artifact

      - name: Get JAR file name
        id: get_jar_name
        run: |
          JAR_FILE=$(find ./downloaded-artifact -name "*.jar" | head -n 1)
          if [ -z "$JAR_FILE" ]; then
            echo "Error: JAR file not found in downloaded-artifact directory."
            exit 1
          fi
          echo "JAR_NAME=$(basename $JAR_FILE)" >> $GITHUB_OUTPUT
          echo "JAR file located at: $JAR_FILE"

      - name: Deploy application (local execution in EC2)
        run: |
          JAR_NAME="${{ steps.get_jar_name.outputs.JAR_NAME }}"
          DOWNLOADED_JAR="./downloaded-artifact/$JAR_NAME"
          TARGET_JAR="/home/ubuntu/app/$JAR_NAME"

          echo "Killing existing application (if running)..."
          PID=$(pgrep -f "$JAR_NAME")
          if [ -n "$PID" ]; then
            echo "Found process with PID: $PID. Sending SIGTERM..."
            kill -15 $PID
            sleep 10
            if kill -0 $PID 2>/dev/null; then
              echo "Process $PID still alive. Forcing kill..."
              kill -9 $PID
            fi
          else
            echo "No running process found."
          fi

          echo "Moving new JAR to $TARGET_JAR"
          mv "$DOWNLOADED_JAR" "$TARGET_JAR"
          chmod +x "$TARGET_JAR"

          echo "Starting application..."
          nohup java -jar "$TARGET_JAR" > /dev/null 2>&1 &

          echo "Waiting for health check..."
          sleep 20
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health)

          if [ "$STATUS_CODE" -eq 200 ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed! Health check returned status $STATUS_CODE"
            exit 1
          fi
